name: IPQ60XX-LibWrt-NoWifi

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: 0 20 * * *

env:
  REPO_URL: https://github.com/laipeng668/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/IPQ60XX_noWifi.config
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: IPQ60XX
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write

jobs:
  Build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check Server Performance(检查服务器性能)
        run: |
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量：$(grep "physical id" /proc/cpuinfo | sort -u | wc -l)"
          echo -e "CPU核心信息：$(grep -m1 "model name" /proc/cpuinfo)\n"
          echo "--------------------------内存信息--------------------------"
          free -h
          echo "--------------------------硬盘信息--------------------------"
          df -hT

      - name: Initialization Environment(初始化环境)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E apt-get -y install dos2unix libfuse-dev
          sudo -E systemctl daemon-reload
          sudo timedatectl set-timezone "$TZ"

      - name: Checkout(检出代码)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Clone Source Code(克隆源代码)
        run: |
          df -hT "$GITHUB_WORKSPACE"
          sudo mkdir -p /mnt/openwrt
          sudo chown -R "$(id -u)":"$(id -g)" /mnt/openwrt

          git clone --depth 1 -b "$REPO_BRANCH" --single-branch "$REPO_URL" /mnt/openwrt
          cd /mnt/openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

          VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
          echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV

          if [ -f target/linux/generic/kernel-6.12 ]; then
            VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12 | head -n1 || true)
          fi
          echo "VERSION_KERNEL=${VERSION_KERNEL:-unknown}" >> $GITHUB_ENV

      - name: Generate Variables(生成变量)
        run: |
          cd "$OPENWRT_PATH"

          # 用两份配置合并生成一次 defconfig，提取 target/subtarget 用于 cache key
          cat "$GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE" "$GITHUB_WORKSPACE/$CONFIG_FILE" > .config
          make defconfig >/dev/null 2>&1 || true

          SOURCE_REPO="$(basename "$REPO_URL")"
          echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV

          DEVICE_TARGET=$(grep -E '^CONFIG_TARGET_BOARD=' .config | awk -F '"' '{print $2}' || true)
          DEVICE_SUBTARGET=$(grep -E '^CONFIG_TARGET_SUBTARGET=' .config | awk -F '"' '{print $2}' || true)

          # 兜底（有时 defconfig 前这两个变量还没写入）
          DEVICE_TARGET="${DEVICE_TARGET:-qualcommax}"
          DEVICE_SUBTARGET="${DEVICE_SUBTARGET:-ipq60xx}"

          echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
          echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV

          echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

      - name: Cache Toolchain(缓存工具链)
        uses: actions/cache@v4
        with:
          key: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }}
          restore-keys: |
            ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
          path: |
            ${{ env.OPENWRT_PATH }}/.ccache
            ${{ env.OPENWRT_PATH }}/staging_dir

      - name: Refresh The Cache(刷新缓存)
        run: |
          if [ -d "$OPENWRT_PATH/staging_dir" ]; then
            find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Install Feeds(安装feeds)
        run: |
          cd "$OPENWRT_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration(运行DIY脚本)
        run: |
          chmod +x "$GITHUB_WORKSPACE/$DIY_SCRIPT"
          cd "$OPENWRT_PATH"
          "$GITHUB_WORKSPACE/$DIY_SCRIPT"

      - name: Prepare Config + Download(合并配置并下载)
        run: |
          cd "$OPENWRT_PATH"
          cat "$GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE" "$GITHUB_WORKSPACE/$CONFIG_FILE" > .config
          make defconfig

          echo "===== CONFIG CHECK (NOWIFI) ====="
          grep -E "CONFIG_TARGET_qualcommax|CONFIG_TARGET_qualcommax_ipq60xx|CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_qihoo_360v6" .config || true
          grep -E "CONFIG_(DEFAULT_)?PACKAGE_(wpad|hostapd-common|wifi-scripts|wireless-regdb|wpa-supplicant|ipq-wifi-qihoo|iwinfo|wireless-tools)" .config || true
          grep -E "CONFIG_PACKAGE_(mihomo|mihomo-client)|CONFIG_PACKAGE_luci-app-mihomo" .config || true
          echo "================================="

          make download -j"$(nproc)"
          find dl -size -1024c -exec rm -f {} \; 2>/dev/null || true

      - name: Compile Firmware(开始编译固件)
        id: compile
        run: |
          cd "$OPENWRT_PATH"
          echo "$(nproc) thread compile"
          make -j"$(nproc)" || make -j1 || make -j1 V=s

          echo "status=success" >> $GITHUB_OUTPUT
          echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

      - name: Check Space Usage(检查空间使用情况)
        if: (!cancelled())
        run: df -hT

      - name: Upload Bin Directory(上传bin目录)
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SOURCE_REPO }}-bin-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
          path: ${{ env.OPENWRT_PATH }}/bin

      - name: Organize Files(整理文件)
        if: steps.compile.outputs.status == 'success'
        run: |
          set -e
          cd "$OPENWRT_PATH/bin/targets/"*/*

          echo "== Target output dir =="
          pwd
          ls -al

          # 保存本次 .config
          cp -f "$OPENWRT_PATH/.config" "${FIRMWARE_TAG}.config"

          # buildinfo（存在才处理）
          [ -f config.buildinfo ] && mv -f config.buildinfo "${FIRMWARE_TAG}.config.buildinfo" || true

          # manifest：不写死名字，自动取当前目录第一个 *.manifest
          MANIFEST_FILE="$(ls -1 *.manifest 2>/dev/null | head -n 1 || true)"
          if [ -n "$MANIFEST_FILE" ]; then
            cp -f "$MANIFEST_FILE" "${FIRMWARE_TAG}.manifest"
          else
            echo "WARN: no .manifest found"
          fi

          # 打包 packages（兼容 .ipk/.apk）
          mkdir -p packages
          find "$OPENWRT_PATH/bin/packages/" -type f \( -name "*.ipk" -o -name "*.apk" \) -exec mv -f {} packages/ \; 2>/dev/null || true
          tar -zcf "${FIRMWARE_TAG}.Packages.tar.gz" packages

          # 清理无关内容（保留 sha256sums，方便校验）
          rm -rf packages feeds.buildinfo version.buildinfo profiles.json 2>/dev/null || true

          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

      - name: Upload Firmware To Artifact(将固件上传到Artifact)
        if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SOURCE_REPO }}-firmware-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE_PATH }}

      - name: Upload Firmware To Release(发布固件)
        if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: R${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
          allowUpdates: true
          tag: ${{ env.FIRMWARE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.FIRMWARE_PATH }}/*
          body: |
            **OpenWrt Firmware for ${{ env.FIRMWARE_TAG }} (NOWIFI / Ethernet Only)**

            ### 固件信息
            - 平台：${{ env.DEVICE_TARGET }} / ${{ env.DEVICE_SUBTARGET }}（qihoo_360v6）
            - 特性：NOWIFI（不编译/不打包 hostapd/wpad/wifi-scripts 等无线组件）
            - 默认地址：**192.168.2.1**
            - 默认密码：none

            ### 版本信息
            - 内核版本：**${{ env.VERSION_KERNEL }}**
            - 源码：${{ env.REPO_URL }} (branch: ${{ env.REPO_BRANCH }})
            - 编译前最后一次更新记录：
            - ${{ env.VERSION_INFO }}

      - name: Delete Old Cache(删除旧缓存)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 可选：如果你不想每次都清缓存，可以注释掉这一整个 step
          echo "Deleting old caches..."
          gh cache list --key "${SOURCE_REPO}-${REPO_BRANCH}-${DEVICE_TARGET}-${DEVICE_SUBTARGET}-" --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key" || true
          done

          echo "========cache status========"
          du -sh "$OPENWRT_PATH/.ccache" 2>/dev/null || true
          du -sh "$OPENWRT_PATH/staging_dir" 2>/dev/null || true